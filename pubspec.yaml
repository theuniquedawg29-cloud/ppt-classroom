name: interactive_ppt_classroom
description: A high-fidelity interactive classroom slideshow presentations viewer in Flutter for classes 7 to 12.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.1.1
  url_launcher: ^6.2.0
  youtube_player_iframe: ^5.1.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  universal_html: ^2.2.4
  http: ^1.2.0
  flutter_pptx: ^0.1.3
  share_plus: ^10.1.0
  screenshot: ^3.0.0
  webview_flutter: ^4.13.1
  webview_flutter_windows: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

dependency_overrides:
  screenshot: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/